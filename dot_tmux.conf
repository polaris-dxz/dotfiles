# ---------------------------------------------------
# Prefix
# ---------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------
# General
# ---------------------------------------------------

set -g mouse on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g base-index 1

# ---------------------------------------------------
# True Color
# ---------------------------------------------------

set -g default-terminal "screen-256color"

set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"

# ---------------------------------------------------
# Better Splits
# ---------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# ---------------------------------------------------
# Vim Navigation
# ---------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------
# Resize Panes
# ---------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------
# Reload Config
# ---------------------------------------------------

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ---------------------------------------------------
# Popup: Claude Code
# ---------------------------------------------------

bind-key y run-shell '
CURRENT_DIR="#{pane_current_path}";
SESSION_NAME="claude-$(echo "$CURRENT_DIR" | md5 | cut -c1-8)";

tmux has-session -t "$SESSION_NAME" 2>/dev/null

if [ $? != 0 ]; then
  tmux new-session -d -s "$SESSION_NAME" -c "$CURRENT_DIR" "
    claude --dangerously-skip-permissions
  "
fi

tmux display-popup \
  -w 85% \
  -h 85% \
  -E "tmux attach-session -t $SESSION_NAME"
'

# ---------------------------------------------------
# Popup: Lazygit
# ---------------------------------------------------

bind-key g display-popup \
  -w 85% \
  -h 85% \
  -E "lazygit"

# ---------------------------------------------------
# Popup: Yazi
# ---------------------------------------------------

bind-key f display-popup \
  -w 90% \
  -h 90% \
  -E "yazi"

# ---------------------------------------------------
# Popup: btop
# ---------------------------------------------------

bind-key b display-popup \
  -w 80% \
  -h 80% \
  -E "btop"

# ---------------------------------------------------
# Session Navigation
# ---------------------------------------------------

bind-key s choose-tree -Z

# ---------------------------------------------------
# Copy Mode (vim style)
# ---------------------------------------------------

setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------
# Status Bar
# ---------------------------------------------------

set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 50
set -g status-right-length 100

set -g status-left "#[fg=#89b4fa] #S "
set -g status-right "#[fg=#a6e3a1]%Y-%m-%d #[fg=#89b4fa]%H:%M "

# ---------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'christoomey/vim-tmux-navigator'

# ---------------------------------------------------
# TPM Init
# ---------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
